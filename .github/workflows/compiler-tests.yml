name: pika-compiler test

on:
  pull_request: { }
  push:
    branches:
      - main

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        kotlin-version:
          - "2.1.20"
          - "2.2.0"
          - "2.2.10"
          - "2.2.20"
          - "2.2.21"
          - "2.3.0"
          - "2.3.10"
          - "2.3.20"

    name: Kotlin ${{ matrix.kotlin-version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test pika-compiler
        run: ./gradlew :pika-compiler:test -PkotlinVersion=${{ matrix.kotlin-version }} --continue

      - uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: Test Results (Kotlin ${{ matrix.kotlin-version }})
