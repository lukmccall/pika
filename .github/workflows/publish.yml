name: Publish

on:
  release:
    types: [released, prereleased]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.0.1)'
        required: false

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: macos-latest
    strategy:
      fail-fast: true
      matrix:
        kotlin-version:
          - "2.1.20"
          - "2.2.0"
          - "2.2.10"
          - "2.2.20"
          - "2.2.21"
          - "2.3.0"
          - "2.3.10"
          - "2.3.20"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish pika-api and pika-compiler to Maven Central
        run: ./gradlew publishToMavenCentral -PkotlinVersion=${{ matrix.kotlin-version }} --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

      - name: Publish pika-gradle plugin to Maven Central
        run: ./gradlew -p pika-gradle publishToMavenCentral -PkotlinVersion=${{ matrix.kotlin-version }} --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

  create-tag:
    name: Create version tags
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from release tag
        id: version
        run: |
          # Extract version from release tag (e.g., v0.0.1 -> 0.0.1) or use input
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Kotlin version tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          KOTLIN_VERSIONS=("2.1.20" "2.2.0" "2.2.10" "2.2.20" "2.2.21" "2.3.0" "2.3.10" "2.3.20")

          for KOTLIN_VERSION in "${KOTLIN_VERSIONS[@]}"; do
            TAG="v${VERSION}-${KOTLIN_VERSION}"
            echo "Creating tag: $TAG"
            git tag "$TAG" || echo "Tag $TAG already exists"
          done

          git push origin --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
